<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligent Search Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
            --google-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 6px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 25px;
        }

        .search-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 16px;
            font-size: 16px;
            color: #fff;
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-wrapper button {
            background: var(--accent-primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .search-wrapper button:hover {
            background: var(--accent-secondary);
        }

        /* Modern Shimmering Loader Animation */
        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .display-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            min-height: 120px;
            max-height: 380px;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .display-panel h3 {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-primary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .display-panel p {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(248, 250, 252, 0.85);
            font-weight: 400;
        }

        .action-link {
            display: inline-flex;
            align-items: center;
            margin-top: 20px;
            padding: 10px 18px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: background 0.2s, transform 0.2s;
        }

        .action-link:hover {
            background: rgba(16, 185, 129, 0.25);
            transform: translateY(-1px);
        }

        .google-btn {
            background: rgba(59, 130, 246, 0.15);
            color: var(--google-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .google-btn:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        /* Custom Scrollbar */
        .display-panel::-webkit-scrollbar {
            width: 6px;
        }
        .display-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .display-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <h1>AI Knowledge Assistant</h1>
        <p>Instant answers aggregated globally without API dependencies</p>
    </div>
    
    <div class="search-wrapper">
        <input type="text" id="userInput" placeholder="Ask anything... (e.g., Quantum Computing)">
        <button onclick="executeAISearch()">Search</button>
    </div>

    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Analyzing database and retrieving information...</div>
    </div>
    
    <div class="display-panel" id="resultPanel">
        <p style="color: var(--text-muted); text-align: center; margin-top: 20px;">
            Your dynamic search feed is empty. Enter a query above to fetch intelligence parameters from public indexes.
        </p>
    </div>
</div>

<script>
    // Trigger search when 'Enter' key is pressed
    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            executeAISearch();
        }
    });

    async function executeAISearch() {
        const query = document.getElementById('userInput').value.trim();
        const resultPanel = document.getElementById('resultPanel');
        const loader = document.getElementById('loader');

        if (!query) {
            alert('Please input a valid search parameters or query.');
            return;
        }

        // Initialize state UI
        loader.style.display = 'flex';
        resultPanel.innerHTML = '';
        resultPanel.style.opacity = '0.5';

        try {
            // Fetch configuration from Wikipedia REST Architecture
            const targetUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const response = await fetch(targetUrl);

            if (response.ok) {
                const data = await response.json();
                
                if (data.extract) {
                    resultPanel.innerHTML = `
                        <h3>Verified Abstract</h3>
                        <p>${data.extract}</p>
                        <a href="${data.content_urls.desktop.page}" target="_blank" class="action-link">
                            Read Full Documentation →
                        </a>
                    `;
                } else {
                    deployGoogleFallback(query, resultPanel);
                }
            } else {
                deployGoogleFallback(query, resultPanel);
            }
        } catch (error) {
            console.error('Data pipeline error:', error);
            deployGoogleFallback(query, resultPanel);
        } finally {
            loader.style.display = 'none';
            resultPanel.style.opacity = '1';
        }
    }

    function deployGoogleFallback(query, resultPanel) {
        const googleTarget = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        resultPanel.innerHTML = `
            <h3>No direct matching vector found</h3>
            <p>The system was unable to extract an exact knowledge matrix from Wikipedia database for this specific query string.</p>
            <a href="${googleTarget}" target="_blank" class="action-link google-btn">
                Stream Live Google Engine Results ↗
            </a>
        `;
    }
</script>

</body>
</html>
